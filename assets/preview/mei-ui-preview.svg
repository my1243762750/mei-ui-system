<svg width="1200" height="680" viewBox="0 0 1200 680" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Mei UI System Presentation</title>
  <desc id="desc">A human-friendly preview of Mei UI System, explaining design logic over technical tokens.</desc>
  
  <defs>
    <linearGradient id="brand-gradient" x1="0" y1="0" x2="368" y2="368" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3B82F6"/>
      <stop offset="0.56" stop-color="#6C5CE7"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="card-shadow" x="0" y="0" width="1200" height="680" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#1A1A2E" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="680" rx="24" fill="#F8F9FC"/>
  
  <!-- Main Container -->
  <rect x="72" y="56" width="1056" height="568" rx="24" fill="white" filter="url(#card-shadow)"/>
  
  <!-- HEADER -->
  <g transform="translate(108, 82) scale(0.0924)">
    <rect width="368" height="368" rx="84" fill="url(#brand-gradient)"/>
    <g transform="translate(-72, -72)">
      <path d="M144 326C170 266 199 218 230 218C261 218 270 258 282 294C294 258 307 218 342 218C381 218 407 266 410 326" stroke="white" stroke-width="40" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="256" cy="154" r="22" fill="white"/>
      <circle cx="214" cy="174" r="14" fill="white"/>
      <circle cx="298" cy="174" r="14" fill="white"/>
    </g>
  </g>
  <text x="154" y="108" fill="#1A1A2E" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="700">Mei UI System</text>
  
  <rect x="970" y="82" width="110" height="38" rx="12" fill="#6C5CE7"/>
  <text x="992" y="106" fill="#FFFFFF" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="600">系统预览</text>

  <rect x="72" y="128" width="1056" height="1" fill="#E4E5EF"/>

  <!-- INTRO SECTION -->
  <text x="108" y="184" fill="#1A1A2E" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="30" font-weight="800">不同产品，同一种 Mei 风格</text>
  <text x="108" y="214" fill="#5E5F6B" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16">通过统一的品牌基因（色彩、圆角、间距），让跨业务系统呈现高度的视觉一致性。</text>

  <!-- MODULES: Communication -->
  <rect x="108" y="252" width="304" height="272" rx="18" fill="#F8F9FC" stroke="#E4E5EF"/>
  <text x="136" y="292" fill="#1A1A2E" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="700">沟通场景</text>
  
  <rect x="136" y="320" width="100" height="36" rx="12" fill="white" stroke="#E4E5EF"/>
  <text x="156" y="343" fill="#5E5F6B" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12">页面背景</text>
  
  <rect x="210" y="375" width="170" height="42" rx="12" fill="#6C5CE7"/>
  <text x="236" y="401" fill="#FFFFFF" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600">品牌气泡样式</text>
  
  <rect x="136" y="445" width="230" height="44" rx="12" fill="white" stroke="#E4E5EF"/>
  <text x="156" y="472" fill="#A1A3B0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12">标准间距规范</text>

  <!-- MODULES: Workspace -->
  <rect x="448" y="252" width="304" height="272" rx="18" fill="white" stroke="#E4E5EF"/>
  <text x="476" y="292" fill="#1A1A2E" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="700">工作台场景</text>
  
  <rect x="476" y="320" width="248" height="64" rx="12" fill="#F8F9FC"/>
  <text x="496" y="344" fill="#5E5F6B" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12">活跃用户</text>
  <text x="496" y="370" fill="#1A1A2E" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="26" font-weight="800">24,680</text>
  
  <rect x="476" y="415" width="200" height="10" rx="5" fill="#E4E5EF"/>
  <rect x="476" y="415" width="140" height="10" rx="5" fill="#3B82F6"/>
  <text x="476" y="436" fill="#A1A3B0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11">功能色引导</text>

  <rect x="476" y="460" width="100" height="26" rx="13" fill="#F5F3FF"/>
  <text x="502" y="477" fill="#6D28D9" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600">统一标签</text>

  <!-- MODULES: Settings -->
  <rect x="788" y="252" width="304" height="272" rx="18" fill="white" stroke="#E4E5EF"/>
  <text x="816" y="292" fill="#1A1A2E" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="700">设置场景</text>
  
  <rect x="816" y="342" width="248" height="42" rx="12" fill="#F8F9FC" stroke="#E4E5EF"/>
  <text x="836" y="368" fill="#A1A3B0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13">标准化表单控件</text>
  
  <rect x="816" y="415" width="110" height="40" rx="12" fill="#6C5CE7"/>
  <text x="840" y="440" fill="#FFFFFF" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600">保存设置</text>
  <rect x="938" y="415" width="98" height="40" rx="12" fill="white" stroke="#E4E5EF"/>
  <text x="962" y="440" fill="#6C5CE7" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600">取消</text>

  <!-- FOOTER Presentation Bar -->
  <rect x="108" y="558" width="984" height="42" rx="21" fill="#F8F9FC"/>
  
  <circle cx="136" cy="579" r="8" fill="#6C5CE7"/>
  <text x="154" y="580" fill="#1A1A2E" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600">品牌身份</text>
  <text x="154" y="594" fill="#A1A3B0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10">primary.base</text>
  
  <rect x="290" y="571" width="16" height="16" rx="4" fill="#1A1A2E"/>
  <text x="314" y="580" fill="#1A1A2E" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600">现代圆角</text>
  <text x="314" y="594" fill="#A1A3B0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10">radius.lg (12px)</text>
  
  <circle cx="450" cy="579" r="8" fill="#3B82F6"/>
  <text x="468" y="580" fill="#1A1A2E" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600">功能引导</text>
  <text x="468" y="594" fill="#A1A3B0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10">blueAxis.base</text>
  
  <rect x="610" y="571" width="16" height="16" rx="4" stroke="#E4E5EF" stroke-width="2"/>
  <text x="634" y="580" fill="#1A1A2E" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600">柔和秩序</text>
  <text x="634" y="594" fill="#A1A3B0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10">border.default</text>
  
  <text x="770" y="580" fill="#1A1A2E" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="700">高易读性</text>
  <text x="770" y="594" fill="#A1A3B0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10">system-sans font</text>
  
  <text x="940" y="588" fill="#A1A3B0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-style="italic">Mei Design Logic v1.0</text>
</svg>
